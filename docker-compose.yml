services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
      - /app/node_modules

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./storage:/tmp/dbf-comparator

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./storage:/tmp/dbf-comparator

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dbf_comparator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
